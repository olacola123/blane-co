<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Astar Island — Ola v8 Score Dashboard</title>
  <style>
    :root {
      --bg: #0d1830;
      --panel: #132240;
      --panel-soft: #17284a;
      --border: rgba(140, 170, 255, 0.18);
      --text: #ecf2ff;
      --muted: #9ca9c9;
      --accent: #8bb3ff;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --shadow: rgba(0, 0, 0, 0.32);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SFMono-Regular", "Menlo", "Monaco", "Consolas", monospace;
      background:
        radial-gradient(circle at top left, rgba(88, 122, 220, 0.18), transparent 34%),
        linear-gradient(180deg, #102041 0%, #0a1428 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      width: min(1400px, calc(100vw - 32px));
      margin: 16px auto;
      padding: 24px;
      background: rgba(11, 22, 45, 0.82);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 60px var(--shadow);
      backdrop-filter: blur(10px);
    }
    .header {
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 28px;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .header p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .summary-card {
      background: rgba(20, 34, 64, 0.88);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
    }
    .summary-card .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .summary-card .value {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .summary-card .subvalue {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .section {
      margin-bottom: 28px;
    }
    .section-title {
      font-size: 15px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* Chart */
    .chart-container {
      background: rgba(14, 24, 46, 0.82);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 28px;
      overflow-x: auto;
    }
    .chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 220px;
      padding-top: 10px;
    }
    .bar-group {
      flex: 1;
      min-width: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .bar-wrapper {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .bar {
      width: 70%;
      border-radius: 6px 6px 2px 2px;
      transition: all 0.3s;
      position: relative;
      cursor: default;
    }
    .bar:hover {
      filter: brightness(1.2);
    }
    .bar-label {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    .bar-value {
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 2px;
    }

    /* Round table */
    .round-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 4px;
    }
    .round-table th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .round-table th:nth-child(n+3) {
      text-align: right;
    }
    .round-table td {
      padding: 10px 12px;
      font-size: 13px;
      background: rgba(20, 34, 64, 0.5);
    }
    .round-table td:nth-child(n+3) {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .round-table tr td:first-child {
      border-radius: 10px 0 0 10px;
    }
    .round-table tr td:last-child {
      border-radius: 0 10px 10px 0;
    }
    .round-table tr:hover td {
      background: rgba(30, 50, 90, 0.7);
    }
    .type-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .type-STABLE { background: rgba(52, 211, 153, 0.18); color: var(--green); }
    .type-DEAD { background: rgba(248, 113, 113, 0.18); color: var(--red); }
    .type-BOOM_SPREAD { background: rgba(251, 191, 36, 0.18); color: var(--yellow); }
    .type-BOOM_CONC { background: rgba(251, 146, 60, 0.18); color: var(--orange); }

    .score-cell {
      font-weight: 700;
      font-size: 14px;
    }
    .score-high { color: var(--green); }
    .score-mid { color: var(--yellow); }
    .score-low { color: var(--red); }

    .seeds-cell {
      color: var(--muted);
      font-size: 12px;
    }

    /* Type summary */
    .type-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .type-card {
      background: rgba(20, 34, 64, 0.88);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }
    .type-card .type-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .type-card .type-name {
      font-size: 16px;
      font-weight: 700;
    }
    .type-card .type-count {
      color: var(--muted);
      font-size: 12px;
    }
    .type-card .type-score {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    .type-card .type-range {
      color: var(--muted);
      font-size: 12px;
    }
    .type-card .score-bar-bg {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
    }
    .type-card .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s;
    }

    /* Threshold lines on chart */
    .chart-area {
      position: relative;
    }
    .threshold-line {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px dashed;
      font-size: 10px;
      padding-left: 4px;
    }

    @media (max-width: 700px) {
      .app { width: calc(100vw - 16px); margin: 8px auto; padding: 14px; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .type-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Ola v8 — Score Dashboard</h1>
      <p>Full test av solution.py (v8 Soft regime inference) mot 15 fullforte runder med oracle type detection. Generert 2026-03-21.</p>
    </div>

    <div id="summary-grid" class="summary-grid"></div>

    <div class="section">
      <div class="section-title">Score per runde</div>
      <div class="chart-container">
        <div class="chart-area">
          <div id="chart" class="chart"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Detaljert per runde</div>
      <table class="round-table">
        <thead>
          <tr>
            <th>Runde</th>
            <th>Type</th>
            <th>Score</th>
            <th>Vekt</th>
            <th>Weighted</th>
            <th>Seeds</th>
          </tr>
        </thead>
        <tbody id="round-tbody"></tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-title">Per world type</div>
      <div id="type-grid" class="type-grid"></div>
    </div>
  </div>

  <script>
    const ROUNDS = [
      { round: 1,  type: "BOOM_SPREAD", score: 84.3, weight: 1.05, weighted: 88.5,  seeds: [84, 84, 83, 87, 84] },
      { round: 2,  type: "BOOM_SPREAD", score: 90.0, weight: 1.10, weighted: 99.2,  seeds: [91, 90, 89, 89, 91] },
      { round: 3,  type: "DEAD",        score: 86.8, weight: 1.16, weighted: 100.5, seeds: [86, 88, 87, 88, 85] },
      { round: 4,  type: "STABLE",      score: 92.3, weight: 1.22, weighted: 112.2, seeds: [91, 93, 92, 92, 93] },
      { round: 5,  type: "STABLE",      score: 81.7, weight: 1.28, weighted: 104.3, seeds: [80, 78, 82, 83, 85] },
      { round: 6,  type: "BOOM_SPREAD", score: 85.0, weight: 1.34, weighted: 113.9, seeds: [85, 85, 84, 85, 86] },
      { round: 7,  type: "BOOM_CONC",   score: 68.5, weight: 1.41, weighted: 96.4,  seeds: [66, 68, 70, 67, 71] },
      { round: 8,  type: "DEAD",        score: 88.9, weight: 1.48, weighted: 131.3, seeds: [87, 92, 86, 90, 90] },
      { round: 9,  type: "STABLE",      score: 90.0, weight: 1.55, weighted: 139.7, seeds: [90, 90, 89, 91, 90] },
      { round: 10, type: "DEAD",        score: 90.4, weight: 1.63, weighted: 147.2, seeds: [90, 90, 90, 91, 91] },
      { round: 11, type: "BOOM_SPREAD", score: 85.8, weight: 1.71, weighted: 146.8, seeds: [88, 88, 80, 87, 86] },
      { round: 12, type: "BOOM_CONC",   score: 60.8, weight: 1.80, weighted: 109.1, seeds: [62, 60, 60, 62, 61] },
      { round: 13, type: "STABLE",      score: 92.6, weight: 1.89, weighted: 174.6, seeds: [93, 92, 92, 93, 92] },
      { round: 14, type: "BOOM_CONC",   score: 37.9, weight: 1.98, weighted: 75.0,  seeds: [40, 35, 39, 40, 35] },
      { round: 15, type: "STABLE",      score: 84.5, weight: 2.08, weighted: 175.7, seeds: [86, 83, 85, 84, 85] },
    ];

    const TYPE_COLORS = {
      STABLE: "#34d399",
      DEAD: "#f87171",
      BOOM_SPREAD: "#fbbf24",
      BOOM_CONC: "#fb923c",
    };

    function scoreColor(s) {
      if (s >= 85) return "var(--green)";
      if (s >= 70) return "var(--yellow)";
      return "var(--red)";
    }
    function scoreClass(s) {
      if (s >= 85) return "score-high";
      if (s >= 70) return "score-mid";
      return "score-low";
    }

    // Summary cards
    const scores = ROUNDS.map(r => r.score);
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    const weightedTotal = ROUNDS.reduce((a, r) => a + r.weighted, 0);
    const last3 = scores.slice(-3);
    const hotStreak = last3.reduce((a, b) => a + b, 0) / last3.length;
    const best = Math.max(...scores);
    const worst = Math.min(...scores);

    const summaryGrid = document.getElementById("summary-grid");
    const cards = [
      { label: "Snitt per runde", value: avg.toFixed(1), sub: `${ROUNDS.length} runder` },
      { label: "Weighted total", value: weightedTotal.toFixed(1), sub: "sum(score x weight)" },
      { label: "Hot streak", value: hotStreak.toFixed(1), sub: "siste 3 runder" },
      { label: "Beste runde", value: best.toFixed(1), sub: `R${ROUNDS.find(r => r.score === best).round}` },
      { label: "Darligste runde", value: worst.toFixed(1), sub: `R${ROUNDS.find(r => r.score === worst).round}` },
    ];
    summaryGrid.innerHTML = cards.map(c => `
      <div class="summary-card">
        <div class="label">${c.label}</div>
        <div class="value" style="color: ${c.label.includes('Darlig') ? 'var(--red)' : c.label.includes('Beste') ? 'var(--green)' : 'var(--text)'}">${c.value}</div>
        <div class="subvalue">${c.sub}</div>
      </div>
    `).join("");

    // Bar chart
    const chart = document.getElementById("chart");
    const maxScore = 100;
    chart.innerHTML = ROUNDS.map(r => {
      const h = (r.score / maxScore) * 170;
      const color = TYPE_COLORS[r.type];
      return `
        <div class="bar-group">
          <div class="bar-value" style="color: ${scoreColor(r.score)}">${r.score.toFixed(1)}</div>
          <div class="bar-wrapper">
            <div class="bar" style="height: ${h}px; background: linear-gradient(180deg, ${color}, ${color}88);" title="R${r.round} ${r.type}: ${r.score}"></div>
          </div>
          <div class="bar-label">R${r.round}</div>
        </div>
      `;
    }).join("");

    // Round table
    const tbody = document.getElementById("round-tbody");
    tbody.innerHTML = ROUNDS.map(r => `
      <tr>
        <td><strong>R${r.round}</strong></td>
        <td><span class="type-badge type-${r.type}">${r.type}</span></td>
        <td class="score-cell ${scoreClass(r.score)}">${r.score.toFixed(1)}</td>
        <td>${r.weight.toFixed(2)}</td>
        <td>${r.weighted.toFixed(1)}</td>
        <td class="seeds-cell">[${r.seeds.join(", ")}]</td>
      </tr>
    `).join("");

    // Type summary
    const typeGrid = document.getElementById("type-grid");
    const typeMap = {};
    ROUNDS.forEach(r => {
      if (!typeMap[r.type]) typeMap[r.type] = [];
      typeMap[r.type].push(r.score);
    });
    const typeOrder = ["STABLE", "DEAD", "BOOM_SPREAD", "BOOM_CONC"];
    typeGrid.innerHTML = typeOrder.filter(t => typeMap[t]).map(t => {
      const s = typeMap[t];
      const avg = s.reduce((a, b) => a + b, 0) / s.length;
      const mn = Math.min(...s);
      const mx = Math.max(...s);
      const color = TYPE_COLORS[t];
      return `
        <div class="type-card">
          <div class="type-header">
            <span class="type-name" style="color: ${color}">${t}</span>
            <span class="type-count">${s.length} runde${s.length > 1 ? "r" : ""}</span>
          </div>
          <div class="type-score" style="color: ${scoreColor(avg)}">${avg.toFixed(1)}</div>
          <div class="type-range">Range: ${mn.toFixed(0)} — ${mx.toFixed(0)}</div>
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width: ${avg}%; background: ${color};"></div>
          </div>
        </div>
      `;
    }).join("");
  </script>
</body>
</html>
